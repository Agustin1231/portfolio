    <script>
        // Forzar scroll al inicio cuando se carga la página
        window.addEventListener('load', function() {
            window.scrollTo(0, 0);
        });
        
        // Fallback inmediato
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        window.scrollTo(0, 0);
        
        // Carga SECUENCIAL garantizada de scripts
        // Orden crítico: script.js → projects-data.js → project-renderer.js
        (function() {
            var timestamp = new Date().getTime();
            var scripts = [
                'script.js',
                'projects-data.js',
                'project-renderer.js'
            ];
            var index = 0;

            function loadNext() {
                if (index >= scripts.length) return;
                var s = document.createElement('script');
                s.src = scripts[index] + '?v=' + timestamp;
                s.onload = function() {
                    index++;
                    loadNext();
                };
                s.onerror = function() {
                    console.error('Error cargando: ' + scripts[index]);
                    index++;
                    loadNext();
                };
                document.body.appendChild(s);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', loadNext);
            } else {
                loadNext();
            }
        })();
    </script>
